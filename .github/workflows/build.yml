name: Build Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: [1.22.x]
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Setup Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Wails to PATH
        shell: bash
        run: echo "PATH=$(go env GOPATH)/bin:$PATH" >> "$GITHUB_PATH"

      - name: Build application
        shell: bash
        run: wails build -tags "netgo webkit2_41" -ldflags '-s -w'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-chat-desktop-${{ matrix.os }}
          path: build/bin/*
          if-no-files-found: ignore